services:
  - type: web
    name: tron-master
    env: python
    plan: free
    region: oregon
    pythonVersion: 3.12.0
    buildCommand: python -m pip install --upgrade pip && python -m pip install -r requirements.txt && python -m py_compile queue_server.py
    startCommand: python -m uvicorn queue_server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: TRON_HOST
        value: 0.0.0.0
      - key: TRON_RELOAD
        value: false
