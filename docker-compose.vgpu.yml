version: '3.8'

services:
  tron-vgpu-scheduler:
    image: python:3.12-slim
    container_name: tron-vgpu-scheduler
    working_dir: /app
    command: python -m vgpu.scheduler
    ports:
      - "9002:9002"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - .:/app
      - tron-vgpu-db:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9002/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - tron-vgpu-net

  tron-vgpu-gateway:
    image: python:3.12-slim
    container_name: tron-vgpu-gateway
    working_dir: /app
    command: python -m vgpu.openai_bridge
    ports:
      - "9003:9003"
    environment:
      - PYTHONUNBUFFERED=1
      - TRON_MASTER_URL=http://tron-vgpu-scheduler:9002
      - TRON_DEFAULT_MODEL=tron-gateway
    volumes:
      - .:/app
    depends_on:
      tron-vgpu-scheduler:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9003/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - tron-vgpu-net

  tron-vgpu-worker-1:
    image: python:3.12-slim
    container_name: tron-vgpu-worker-1
    working_dir: /app
    command: python -m vgpu.worker --name worker-1 --master-url http://tron-vgpu-scheduler:9002 --gpu-name "RTX 3050" --vram-gb 4.0 --cuda-cores 2048 --verbose
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - .:/app
    depends_on:
      tron-vgpu-scheduler:
        condition: service_healthy
    networks:
      - tron-vgpu-net

  tron-vgpu-worker-2:
    image: python:3.12-slim
    container_name: tron-vgpu-worker-2
    working_dir: /app
    command: python -m vgpu.worker --name worker-2 --master-url http://tron-vgpu-scheduler:9002 --gpu-name "RTX 3060" --vram-gb 6.0 --cuda-cores 3584 --verbose
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - .:/app
    depends_on:
      tron-vgpu-scheduler:
        condition: service_healthy
    networks:
      - tron-vgpu-net

volumes:
  tron-vgpu-db:
    driver: local

networks:
  tron-vgpu-net:
    driver: bridge
